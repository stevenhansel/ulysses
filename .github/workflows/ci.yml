# =============================================================================
# Ulysses CI/CD Pipeline
#
# Stages:
#   1. Linting     — clippy (all targets, all features)
#   2. Testing     — cargo test (SSR), cargo check WASM hydration
#   3. Docker      — build & push to ghcr.io (main only)  — after lint + test
#   4. Security    — cargo audit, trivy scan               — every 3 days (cron)
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 */3 * *" # every 3 days at midnight UTC

env:
  CARGO_TERM_COLOR: always

# ─── Jobs ───────────────────────────────────────────────────────────────────

jobs:
  # ── Linting ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (clippy + wasm)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Check WASM compilation
        run: cargo check --target wasm32-unknown-unknown --features hydrate --no-default-features

      - name: Lint (clippy — all targets, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Testing ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain + WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test

  # ── Docker Build & Push (main only) ─────────────────────────────────────
  docker:
    name: Docker Build & Push
    if: >
      github.ref == 'refs/heads/main'
      && github.event_name != 'schedule'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/stevenhansel/ulysses
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security & Vulnerability Scanning (every 3 days) ────────────────────
  security-rust:
    name: Security Scan (Rust deps)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Scan Rust dependencies (cargo audit)
        continue-on-error: true
        run: cargo audit

      - name: Export JSON report
        continue-on-error: true
        run: cargo audit --json > rust-audit-report.json || true

      - name: Upload Rust audit report
        uses: actions/upload-artifact@v4
        with:
          name: rust-audit-report
          path: rust-audit-report.json

  security-docker:
    name: Security Scan (Docker image)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.36.0
        continue-on-error: true
        with:
          image-ref: ghcr.io/stevenhansel/ulysses:latest
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: docker-image
